<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測驗系統</title>
    <!-- 修正路徑：直接引用 style.css -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>測驗系統</h1>

    <div id="setup">
        <label>選擇章節：</label>
        <select id="chapter">
            <option value="all">全部章節</option>
            <option value="CH2-2">CH2-2</option>
            <option value="CH3-1">CH3-1</option>
            <option value="CH3-2">CH3-2</option>
        </select>

        <label>題數：</label>
        <select id="count">
            <option value="10">10題</option>
            <option value="20">20題</option>
            <option value="30">30題</option>
        </select>

        <button onclick="startQuiz()">開始測驗</button>
    </div>

    <div id="quiz" style="display:none;">
        <div id="progress" style="margin-bottom: 10px; color: #666;"></div>
        <div id="question" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;"></div>
        <div id="options" style="display: flex; flex-direction: column; gap: 10px;"></div>

        <div style="margin-top: 20px;">
            <button id="nextBtn" onclick="next()" style="display:none;">下一題</button>
            <button id="submitBtn" onclick="submitQuiz()" style="display:none;">交卷</button>
        </div>
    </div>
</div>

<!-- Firebase SDK (使用 compat 版本以相容你的語法) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- 修正路徑：直接引用根目錄檔案 -->
<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
