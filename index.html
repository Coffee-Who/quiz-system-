<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>測驗系統</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h1>測驗系統</h1>

  <div id="setup">
    <select id="chapter">
      <option value="all">全部章節</option>
      <option value="CH2-2">CH2-2</option>
      <option value="CH3-1">CH3-1</option>
      <option value="CH3-2">CH3-2</option>
    </select>

    <select id="count">
      <option value="10">10題</option>
      <option value="20">20題</option>
      <option value="30">30題</option>
    </select>

    <button onclick="startQuiz()">開始測驗</button>
  </div>

  <div id="quiz" style="display:none;">
    <div id="progress"></div>
    <div id="question"></div>
    <div id="options"></div>

    <button onclick="next()">下一題</button>
    <button onclick="submitQuiz()">交卷</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>

</body>
</html>
